# Compose dedicato ai test di compatibilita del plugin fitp-enricher
# contro versioni diverse di Keycloak.
#
# Uso:
#   1. Build del plugin:           gradle build
#   2. Test su versione default:   docker compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from smoke-tests
#   3. Test su altra versione:     KEYCLOAK_IMAGE=quay.io/keycloak/keycloak:25.0 docker compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from smoke-tests
#   4. Matrice completa:           ./scripts/test-matrix.sh
#
# Variabili:
#   KEYCLOAK_IMAGE  immagine Keycloak da testare (default: 26.0)
#   PLUGIN_JAR      nome del jar (default: fitp-enricher-0.3.2.jar)
#   JAR_DIR         directory che contiene il jar (default: ./build/libs per Gradle; usa ./target per Maven)

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.0}
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: INFO,com.hiwaymedia.keycloak:DEBUG
    ports:
      - "8080:8080"
    volumes:
      - ${JAR_DIR:-./build/libs}/${PLUGIN_JAR:-fitp-enricher-0.3.2.jar}:/opt/keycloak/providers/${PLUGIN_JAR:-fitp-enricher-0.3.2.jar}:ro
    depends_on:
      postgres:
        condition: service_healthy

  smoke-tests:
    image: alpine:3.20
    depends_on:
      - keycloak
    environment:
      KC_URL: http://keycloak:8080
      KC_ADMIN_USER: admin
      KC_ADMIN_PASSWORD: admin
      KEYCLOAK_IMAGE: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.0}
    volumes:
      - ./scripts/smoke-test.sh:/smoke-test.sh:ro
    command: >
      sh -c "apk add --no-cache curl jq bash >/dev/null && bash /smoke-test.sh"
