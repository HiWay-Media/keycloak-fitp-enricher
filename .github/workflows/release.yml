name: Build and Release JAR

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish release artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Resolve release files
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          JAR_PATH="$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1)"
          if [[ -z "${JAR_PATH}" ]]; then
            echo "No release jar found under target/."
            exit 1
          fi
          SHA_PATH="${JAR_PATH}.sha512"
          sha512sum "${JAR_PATH}" | awk '{print $1}' > "${SHA_PATH}"
          echo "jar_path=${JAR_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha_path=${SHA_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${{ steps.artifacts.outputs.jar_path }}" "${{ steps.artifacts.outputs.sha_path }}" --clobber
          else
            gh release create "${TAG}" "${{ steps.artifacts.outputs.jar_path }}" "${{ steps.artifacts.outputs.sha_path }}" --generate-notes --verify-tag
          fi